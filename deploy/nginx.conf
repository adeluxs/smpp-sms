server {
    listen 80;
    server_name sms.example.com;

    root /opt/smpp-platform/laravel/public;
    index index.php index.html;

    charset utf-8;
    server_tokens off;

    client_max_body_size 50M;

    # -----------------------------------------------------
    # Security Headers
    # -----------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Uncomment after HTTPS is configured
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -----------------------------------------------------
    # Laravel Routing
    # -----------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -----------------------------------------------------
    # PHP
    # -----------------------------------------------------
    location ~ \.php$ {
        try_files $uri =404;

        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/www.sock;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 60;

        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 64k;
    }

    # -----------------------------------------------------
    # Deny access to hidden files
    # -----------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # -----------------------------------------------------
    # Block sensitive files
    # -----------------------------------------------------
    location ~* \.(env|ini|log|conf|bak|sql|sqlite|yml|yaml|git)$ {
        deny all;
        return 404;
    }

    # -----------------------------------------------------
    # Static Assets
    # -----------------------------------------------------
    location ~* \.(css|js|jpg|jpeg|gif|png|svg|ico|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------------------
    # Favicon & Robots
    # -----------------------------------------------------
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # -----------------------------------------------------
    # Disable access to vendor & storage
    # -----------------------------------------------------
    location ~ ^/(vendor|storage|bootstrap|config|database|resources|routes|tests)/ {
        deny all;
    }

    # -----------------------------------------------------
    # Health Check
    # -----------------------------------------------------
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }

    # -----------------------------------------------------
    # Gzip Compression
    # -----------------------------------------------------
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        image/svg+xml;

    # -----------------------------------------------------
    # Logging
    # -----------------------------------------------------
    access_log /var/log/nginx/smpp-access.log;
    error_log /var/log/nginx/smpp-error.log warn;
}